proxy:
  image:
    repository: "proiectpcdproductionacr.azurecr.io/listmonk-proxy"
    tag: latest

replicaCount: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: listmonk
          topologyKey: kubernetes.io/hostname

postgresql:
  primary:
    persistence:
      storageClass: managed-csi
      size: 10Gi

adminUser: admin
adminEmail: "admin@proiectpcd.local"

# Injected at deploy time — never commit real values
adminPassword: ""        # --set adminPassword=<value>
serviceBusConnectionString: ""  # --set serviceBusConnectionString=$(terraform output -raw servicebus_connection_string)
