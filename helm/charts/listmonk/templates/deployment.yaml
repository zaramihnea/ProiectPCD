apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: listmonk
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: listmonk
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: listmonk
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        # Wait for PostgreSQL to be ready before running listmonk --install
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"

        # Set up the DB schema on first deploy
        - name: listmonk-install
          image: "{{ .Values.listmonk.image.repository }}:{{ .Values.listmonk.image.tag }}"
          imagePullPolicy: {{ .Values.listmonk.image.pullPolicy }}
          command: ["./listmonk", "--install", "--yes"]
          env:
            - name: LISTMONK_db__host
              value: "{{ .Release.Name }}-postgresql"
            - name: LISTMONK_db__port
              value: "5432"
            - name: LISTMONK_db__user
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: LISTMONK_db__password
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: LISTMONK_db__database
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: LISTMONK_app__admin_username
              value: {{ .Values.adminUser | quote }}
            - name: LISTMONK_app__admin_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-password

      containers:
        # Listmonk — listens on internal port 9001
        - name: listmonk
          image: "{{ .Values.listmonk.image.repository }}:{{ .Values.listmonk.image.tag }}"
          imagePullPolicy: {{ .Values.listmonk.image.pullPolicy }}
          command: ["./listmonk"]
          ports:
            - containerPort: 9001
              name: http-internal
          env:
            - name: LISTMONK_app__address
              value: "0.0.0.0:9001"
            - name: LISTMONK_db__host
              value: "{{ .Release.Name }}-postgresql"
            - name: LISTMONK_db__port
              value: "5432"
            - name: LISTMONK_db__user
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: LISTMONK_db__password
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: LISTMONK_db__database
              value: {{ .Values.postgresql.auth.database | quote }}
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10

        # Proxy sidecar — listens on 9000, forwards to Listmonk on 9001
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: PORT
              value: "9000"
            - name: LISTMONK_URL
              value: "http://localhost:9001"
            - name: TOPIC_NAME
              value: {{ .Values.topicName | quote }}
            - name: SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: servicebus-connection-string
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
